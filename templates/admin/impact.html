{% extends 'admin/dashboard.html' %}
{% block content %}
<h2>Impact</h2>
<form method="POST">{% csrf_token %}
<input name="title" placeholder="Title">
<input name="value" placeholder="Value">
<button>Add</button>
</form>

{% for i in impacts %}
<p>{{ i.title }} - {{ i.value }} <a href="{% url 'delete_impact' i.id %}">Delete</a></p>
{% endfor %}
{% endblock %}
