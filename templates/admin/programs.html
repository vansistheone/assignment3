{% extends 'admin/dashboard.html' %}
{% block content %}
<h2>Programs</h2>
<form method="POST">{% csrf_token %}
<input name="name" placeholder="Name">
<input name="description" placeholder="Description">
<button>Add</button>
</form>

{% for p in programs %}
<p>{{ p.name }} <a href="{% url 'delete_program' p.id %}">Delete</a></p>
{% endfor %}
{% endblock %}
