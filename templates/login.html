<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>

<body>

<h2>Login</h2>

<form method="POST">

{% csrf_token %}

<input type="email" name="email" placeholder="Email"><br><br>

<input type="password" name="password" placeholder="Password"><br><br>

<button type="submit">Login</button>

</form>

{% if error %}
<p>{{error}}</p>
{% endif %}

<a href="/register/">Create Account</a>

</body>
</html>
