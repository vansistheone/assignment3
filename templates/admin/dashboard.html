<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial; display: flex; margin:0; }
        .sidebar {
            width: 220px;
            background: #2c3e50;
            color: white;
            height: 100vh;
            padding: 20px;
        }
        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 10px 0;
        }
        .content {
            flex: 1;
            padding: 20px;
        }
        button { padding: 5px 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Admin</h2>
    <a href="{% url 'admin_dashboard' %}">Dashboard</a>
    <a href="{% url 'core_values_admin' %}">Core Values</a>
    <a href="{% url 'programs_admin' %}">Programs</a>
    <a href="{% url 'team_admin' %}">Team</a>
    <a href="{% url 'impact_admin' %}">Impact</a>
    <a href="{% url 'mission_admin' %}">Mission & Vision</a>
    <a href="{% url 'story_admin' %}">Our Story</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
