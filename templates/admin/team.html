{% extends 'admin/dashboard.html' %}
{% block content %}
<h2>Team</h2>
<form method="POST">{% csrf_token %}
<input name="name" placeholder="Name">
<input name="role" placeholder="Role">
<button>Add</button>
</form>

{% for t in team %}
<p>{{ t.name }} - {{ t.role }} <a href="{% url 'delete_team' t.id %}">Delete</a></p>
{% endfor %}
{% endblock %}
